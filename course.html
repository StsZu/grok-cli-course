<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grok CLI Course — Уроки</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { --bg: #0a0a0a; --panel: #141414; --border: #2a2a2a; --text: #f4f4f5; --muted: #a1a1aa; --accent: #fafafa; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    .wrap { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    @media (max-width: 800px) { .wrap { grid-template-columns: 1fr; } aside { border-right: none !important; border-bottom: 1px solid var(--border); } }
    aside { background: var(--panel); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; }
    main { padding: 24px 32px; overflow-y: auto; max-width: 820px; }
    .top-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .top-nav a { color: var(--muted); text-decoration: none; font-size: 0.85rem; padding: 5px 10px; border-radius: 6px; }
    .top-nav a:hover { color: var(--text); background: #1f1f1f; }
    .top-nav a.active { color: var(--accent); }
    h1.side { font-size: 1rem; margin: 0 0 12px; }
    .lesson-link {
      display: block; padding: 8px 10px; border-radius: 8px; color: var(--text);
      text-decoration: none; font-size: 0.85rem; margin-bottom: 4px; border: 1px solid transparent;
    }
    .lesson-link:hover { background: #1f1f1f; }
    .lesson-link.active { border-color: #52525b; color: var(--accent); background: #18181b; }
    #content { line-height: 1.65; font-size: 0.95rem; }
    #content h1 { font-size: 1.5rem; margin-top: 0; }
    #content h2 { font-size: 1.15rem; color: var(--accent); margin-top: 1.5em; }
    #content code { background: #27272a; padding: 2px 6px; border-radius: 4px; font-size: 0.88em; }
    #content pre { background: #18181b; border: 1px solid var(--border); border-radius: 8px; padding: 14px; overflow-x: auto; }
    #content pre code { background: none; padding: 0; }
    #content table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 0.9rem; }
    #content th, #content td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; }
    #content th { background: #27272a; }
    #loading { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <aside>
      <nav class="top-nav">
        <a href="index.html">Тренажер</a>
        <a href="course.html" class="active">Уроки</a>
        <a href="cheatsheet.html">Шпаргалка</a>
      </nav>
      <h1 class="side">Уроки курсу</h1>
      <a class="lesson-link active" href="#" data-file="grok-cli-course/README.md">Огляд</a>
      <a class="lesson-link" href="#" data-file="grok-cli-course/01-launch-and-workflow.md">1. Запуск</a>
      <a class="lesson-link" href="#" data-file="grok-cli-course/02-sessions.md">2. Сесії</a>
      <a class="lesson-link" href="#" data-file="grok-cli-course/03-context-and-plan.md">3. Контекст і план</a>
      <a class="lesson-link" href="#" data-file="grok-cli-course/04-model-and-ui.md">4. Модель і UI</a>
      <a class="lesson-link" href="#" data-file="grok-cli-course/05-modes-and-safety.md">5. Режими</a>
      <a class="lesson-link" href="#" data-file="grok-cli-course/06-extensions.md">6. Extensions</a>
      <a class="lesson-link" href="#" data-file="grok-cli-course/07-shell-commands.md">7. Shell commands</a>
      <a class="lesson-link" href="#" data-file="grok-cli-course/08-skills-and-risks.md">8. Skills і ризики</a>
    </aside>
    <main>
      <div id="loading">Завантаження…</div>
      <article id="content"></article>
    </main>
  </div>
  <script>
    const links = document.querySelectorAll(".lesson-link");
    const content = document.getElementById("content");
    const loading = document.getElementById("loading");

    async function loadLesson(file) {
      loading.style.display = "block";
      content.innerHTML = "";
      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error(res.statusText);
        const md = await res.text();
        content.innerHTML = marked.parse(md);
      } catch (e) {
        content.innerHTML = `<p style="color:#f87171">Помилка: ${e.message}</p>`;
      }
      loading.style.display = "none";
    }

    links.forEach(link => {
      link.addEventListener("click", e => {
        e.preventDefault();
        links.forEach(l => l.classList.remove("active"));
        link.classList.add("active");
        loadLesson(link.dataset.file);
      });
    });

    loadLesson("grok-cli-course/README.md");
  </script>
</body>
</html>
