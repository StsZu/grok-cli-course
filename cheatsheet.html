<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grok CLI — Шпаргалка</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { --bg: #0a0a0a; --border: #2a2a2a; --text: #f4f4f5; --muted: #a1a1aa; --accent: #fafafa; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    .top-nav { display: flex; gap: 10px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .top-nav a { color: var(--muted); text-decoration: none; font-size: 0.88rem; padding: 6px 12px; border-radius: 8px; }
    .top-nav a:hover { color: var(--text); background: #1f1f1f; }
    .top-nav a.active { color: var(--accent); }
    #content { line-height: 1.6; }
    #content h2 { color: var(--accent); font-size: 1.1rem; margin-top: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    #content code { background: #27272a; padding: 2px 6px; border-radius: 4px; font-family: "SF Mono", Menlo, monospace; font-size: 0.88em; }
    #content pre { background: #18181b; border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-x: auto; }
    #content pre code { background: none; padding: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="top-nav">
      <a href="index.html">Тренажер</a>
      <a href="course.html">Уроки</a>
      <a href="cheatsheet.html" class="active">Шпаргалка</a>
    </nav>
    <article id="content">Завантаження…</article>
  </div>
  <script>
    fetch("grok-cli-course/cheatsheet.md")
      .then(r => r.text())
      .then(md => { document.getElementById("content").innerHTML = marked.parse(md); });
  </script>
</body>
</html>
